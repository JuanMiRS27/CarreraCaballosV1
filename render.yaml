services:
  - type: web
    name: carrera-caballos
    runtime: java
    plan: free
    buildCommand: mvn clean package
    startCommand: java -jar target/CarreraCaballos-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
